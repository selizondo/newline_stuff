name: tool_realism
label: "D3: Tool Realism"
threshold: 0.95
prompt_template: |
  Evaluate D3 — Tool Realism.

  Tools PASS if ALL of them:
  - Cost less than ~$50 each
  - Are available at a typical hardware store (Home Depot, Lowe's, Ace Hardware)
  - Do not require a professional license to purchase or use

  Tools FAIL if any single tool is outside what a homeowner could reasonably buy for this repair.

  PASS example (replacing a toilet fill valve): "Adjustable wrench, sponge, bucket."
  FAIL example (replacing a toilet fill valve): "Pipe threading machine, pressure test gauge."

  Respond with exactly one digit: 1 if PASS, 0 if FAIL.

  Question: {question}
  Tools Required: {tools}
