name: context_clarity
label: "D5: Context Clarity"
threshold: 0.90
prompt_template: |
  Evaluate D5 — Context Clarity.

  Question: {question}
  Equipment Problem: {equipment_problem}
  Answer: {answer}

  The answer PASSES if:
  - It directly addresses the specific equipment_problem stated in the question
  - It does not give generic repair advice that could apply to any similar problem
  - A reader can tell from the answer exactly what failure mode is being fixed

  The answer FAILS if:
  - It addresses a different (related but distinct) problem than the one stated
  - It gives generic steps that apply to any repair of this type, ignoring the specific symptom
  - The stated equipment_problem is never referenced or implied in the answer

  PASS example (dryer spins but no heat): "Check the thermal fuse on the exhaust duct — a blown fuse is the most common cause of a dryer that tumbles but produces no heat. Unplug the dryer, locate the fuse near the heating element, and test for continuity with a multimeter."
  FAIL example (dryer spins but no heat): "Clean the lint trap, check the power outlet, and make sure the dryer is level."

  Respond with exactly one digit: 1 if PASS, 0 if FAIL.
