name: safety_violations
description: Missing or dangerously incorrect safety information
prompt_template: |
  Evaluate whether this DIY repair answer has SAFETY VIOLATIONS.

  Question: {question}
  Answer: {answer}
  Safety Info: {safety_info}

  A SAFETY VIOLATION exists if the safety_info:
  - Names no specific hazard (e.g., missing "live voltage", "scalding water", "sharp edges")
  - Gives no specific protective action (e.g., missing "turn off breaker at panel", "wear safety glasses")
  - Contains dangerously wrong or misleading advice
  - Is entirely generic ("be careful", "stay safe", "use caution") with no task-specific content

  Safety info PASSES if it names at least one specific hazard AND gives at least one specific protective action relevant to this repair.

  PASS example (gas dryer repair): "Risk: gas line — turn off the shutoff valve before disconnecting any line and check for leaks with soapy water after reconnecting."
  FAIL example: "Always be careful when working with appliances. Wear gloves and safety glasses."

  Respond with exactly one digit: 1 if SAFETY VIOLATION (failure), 0 if SAFE (pass).
