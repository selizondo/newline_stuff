category: appliance_repair

# Seeded from chain_of_thought + human_feedback corrections.
# Targets: incomplete_answer, safety_specificity, poor_quality_tips, step_actionability

system: >-
  You are a master appliance repair technician with 20 years of field experience.
  Before writing any repair guide, you reason systematically through the problem:
  root cause, required tools, safety hazards, and the professional insight most
  homeowners miss. Your final output reflects that careful thinking.
user: |
  Generate a complete, detailed home appliance repair Q&A pair using this reasoning process:

  Think through each of these before writing your answer:
  1. What specific appliance problem will this cover, and what is its root cause?
  2. What tools does this repair actually require? Only include tools under $50 available at hardware stores.
  3. What is the exact safety hazard — name the specific risk (voltage, capacitor charge, sharp edge) and the precise protective action the homeowner must take?
  4. What is one non-obvious professional tip — a specific part name, measurement, or technique a homeowner would not find in the manual?
  5. What are the ordered steps, each starting with a strong action verb naming the exact part?

  After reasoning through the above, return ONLY a valid JSON object — do not include your reasoning in the output:
  {
    "question": "<specific appliance repair question, 10-500 chars>",
    "answer": "<COMPLETE narrative of at least 3 paragraphs: (1) root cause and why it happens, (2) how to fix in prose, (3) prevention. 200-2000 chars. No bullet points. Must be detailed enough that a homeowner can perform the repair without outside help. Do NOT use vague phrases like 'check it', 'look for issues', 'repeat as needed', or 'follow the steps below'.>",
    "equipment_problem": "<concise appliance-specific problem description, 5-200 chars>",
    "tools_required": ["<tool 1>", "<tool 2>", ...],
    "steps": ["<step 1>", "<step 2>", "<step 3>", "<step 4>", "<step 5>", ...],
    "safety_info": "<REQUIRED: name the SPECIFIC hazard (e.g. '120V AC shock from capacitor holding charge after unplug') + the EXACT protective action (e.g. 'discharge capacitor with a 10k-ohm resistor before touching terminals') + the consequence if ignored (e.g. 'fatal electrocution'). Minimum 80 chars.>",
    "tips": ["<concrete, non-obvious tip — include specific part names, measurements, or timing. NOT generic advice like 'be careful' or 'unplug first'.>", "<second distinct actionable tip>"]
  }

  Rules:
  - answer: MUST identify the root cause AND provide a complete repair summary
  - tools_required: homeowner-accessible tools costing <$50 each; no professional-grade or trade-only equipment
  - steps: MINIMUM 5 steps. Each step MUST start with a strong action verb (disconnect, remove, unscrew, replace, tighten, measure) — NOT 'check', 'look', 'ensure', 'verify', 'inspect', or 'be careful'. Name the exact part.
  - safety_info: MUST name the specific hazard AND specific protective action AND consequence — no vague phrases
  - tips: MUST be task-specific with numbers, part names, or timing — not general encouragement
  - Do NOT wrap JSON in markdown code fences.
