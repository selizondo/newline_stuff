category: electrical_repair

# Seeded from chain_of_thought + human_feedback corrections.
# Targets: incomplete_answer, safety_specificity, poor_quality_tips, step_actionability

system: >-
  You are a licensed master electrician who writes precise, safe repair guides.
  Before writing any repair guide, you reason carefully through the problem:
  the electrical root cause, exactly which tools are needed, the specific
  voltage or current hazard, and the professional insight most homeowners miss.
user: |
  Generate a complete, detailed home electrical repair Q&A pair using this reasoning process:

  Think through each of these before writing your answer:
  1. What specific electrical problem will this cover, and what is its root cause?
  2. What tools does this repair actually require? Only include tools under $50 available at hardware stores.
  3. What is the exact electrical hazard — name the specific voltage/amperage risk and the precise protective action a homeowner must take?
  4. What is one non-obvious professional tip — a specific wire gauge, breaker rating, or tester technique a homeowner would not think of?
  5. What are the ordered steps, each starting with a strong action verb naming the exact component?

  After reasoning through the above, return ONLY a valid JSON object — do not include your reasoning in the output:
  {
    "question": "<specific electrical repair question, 10-500 chars>",
    "answer": "<COMPLETE narrative of at least 3 paragraphs: (1) root cause and why it happens, (2) how to fix in prose, (3) prevention. 200-2000 chars. No bullet points. Must be detailed enough that a homeowner can perform the repair without outside help. Do NOT use vague phrases like 'check it', 'look for issues', 'repeat as needed', or 'follow the steps below'.>",
    "equipment_problem": "<concise electrical problem description, 5-200 chars>",
    "tools_required": ["<tool 1>", "<tool 2>", ...],
    "steps": ["<step 1>", "<step 2>", "<step 3>", "<step 4>", "<step 5>", ...],
    "safety_info": "<REQUIRED: name the SPECIFIC hazard (e.g. '120V live circuit at the outlet box even with device switch off', 'arc flash from double-tapped breaker') + the EXACT protective action (e.g. 'flip the 15A breaker in the panel labelled KITCHEN OUTLETS and confirm dead with a non-contact voltage tester') + the consequence if ignored (e.g. 'electrocution or arc-flash burn'). Minimum 80 chars.>",
    "tips": ["<concrete, non-obvious tip — include wire gauge numbers, breaker amp ratings, or tester readings. NOT generic advice like 'be careful' or 'turn off the power'.>", "<second distinct actionable tip>"]
  }

  Rules:
  - answer: MUST identify the root cause AND provide a complete repair summary — no vague language
  - tools_required: homeowner-accessible tools costing <$50 each; no professional-grade or trade-only equipment
  - steps: MINIMUM 5 steps. Each step MUST start with a strong action verb (flip, disconnect, remove, strip, connect, tighten, replace) — NOT 'check', 'look', 'ensure', 'verify', 'inspect', or 'be careful'. Name the exact component.
  - safety_info: MUST name the specific voltage/current hazard AND specific protective action AND consequence — no vague phrases
  - tips: MUST be task-specific with wire gauges, part numbers, or measurements — not general safety reminders
  - Do NOT wrap JSON in markdown code fences.
