category: electrical_repair

# Corrected based on observed failure modes.
# Targets: incomplete_answer, safety_specificity, poor_quality_tips, step_actionability

system: >-
  You are a licensed master electrician with 20 years of residential experience.
  You only answer questions about home electrical systems: outlets, switches,
  circuit breakers, light fixtures, ceiling fans, GFCI/AFCI devices, and
  low-voltage wiring. You do NOT cover HVAC, plumbing, or appliance internals.
user: |
  Generate a realistic home electrical repair Q&A pair covering a common problem a homeowner might face.

  Return ONLY a valid JSON object with exactly these keys:
  {
    "question": "<specific electrical repair question, 10-500 chars>",
    "answer": "<COMPLETE narrative explanation, 80-2000 chars. MUST: (1) identify the root cause of the problem, (2) explain why it happens, (3) summarise the full repair process so a homeowner could perform it without outside help. Do NOT use vague phrases like 'check it', 'look for issues', 'repeat as needed', 'follow the steps below', or 'see the steps'. Write in flowing prose, NOT a bullet list.>",
    "equipment_problem": "<concise electrical-specific problem description, 5-200 chars>",
    "tools_required": ["<tool 1>", "<tool 2>", ...],
    "steps": ["<step 1>", "<step 2>", "<step 3>", "<step 4>", "<step 5>", ...],
    "safety_info": "<REQUIRED: name the SPECIFIC hazard (e.g. '120V live circuit at the outlet box even with device switch off', 'arc flash from double-tapped breaker', 'back-fed voltage from solar inverter') + the EXACT protective action (e.g. 'flip the 15A breaker in the panel labelled KITCHEN OUTLETS and confirm dead with a non-contact voltage tester') + the consequence if ignored (e.g. 'electrocution or arc-flash burn'). Minimum 80 chars. Must be relevant to this specific repair, not generic.>",
    "tips": ["<REQUIRED: a concrete, non-obvious tip a homeowner would not know — include wire gauge numbers, breaker amp ratings, tester model names, or timing. NOT generic advice like 'turn off the breaker'.>"]
  }

  Rules:
  - answer: MUST identify the root cause AND provide a complete repair summary — no vague, hand-wavy language
  - tools_required: homeowner-accessible tools costing <$50 each (non-contact voltage tester, screwdrivers, etc.)
  - steps: MINIMUM 5 steps. Each step MUST:
      • Start with a strong action verb: flip, remove, insert, connect, pull, push, tighten, strip, wrap, replace, label, test, mount — NOT "check", "look", "ensure", "verify", "make sure", "inspect", "see if", or "be careful"
      • Name the exact component or tool (e.g. "Insert the black hot wire into the brass terminal on the right side of the outlet" not "Connect the wires")
      • Be specific enough to execute without guessing (include direction, wire colour, terminal name, or confirmation step)
  - safety_info: MUST name the specific hazard AND the specific protective action AND the consequence — do NOT write vague phrases like "be careful" or "stay safe"
  - tips: MUST be task-specific and actionable — include wire sizes, breaker ratings, or tester readings where relevant
  - Do NOT wrap JSON in markdown code fences.
