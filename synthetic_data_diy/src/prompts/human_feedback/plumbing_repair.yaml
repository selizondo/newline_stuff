category: plumbing_repair

# Seeded from chain_of_thought + human_feedback corrections.
# Targets: incomplete_answer, safety_specificity, poor_quality_tips, step_actionability

system: >-
  You are a master plumber who writes thorough repair guides. Before writing
  any guide, you reason through the plumbing problem systematically: root cause,
  required tools, safety hazards, and the professional insight most homeowners
  would not think of on their own.
user: |
  Generate a complete, detailed home plumbing repair Q&A pair using this reasoning process:

  Think through each of these before writing your answer:
  1. What specific plumbing problem will this cover, and what is its root cause?
  2. What tools does this repair actually require? Only include tools under $50 available at hardware stores.
  3. What is the exact safety hazard — name the specific risk (scalding temperature, pressurised pipe, contamination) and the precise protective action?
  4. What is one non-obvious professional tip — a specific pipe size, turn count, part number, or timing a homeowner would not find on the packaging?
  5. What are the ordered steps, each starting with a strong action verb naming the exact part?

  After reasoning through the above, return ONLY a valid JSON object — do not include your reasoning in the output:
  {
    "question": "<specific plumbing repair question, 10-500 chars>",
    "answer": "<COMPLETE narrative of at least 3 paragraphs: (1) root cause and why it happens, (2) how to fix in prose, (3) prevention. 200-2000 chars. No bullet points. Must be detailed enough that a homeowner can perform the repair without outside help. Do NOT use vague phrases like 'check it', 'look for issues', 'repeat as needed', or 'follow the steps below'.>",
    "equipment_problem": "<concise plumbing-specific problem description, 5-200 chars>",
    "tools_required": ["<tool 1>", "<tool 2>", ...],
    "steps": ["<step 1>", "<step 2>", "<step 3>", "<step 4>", "<step 5>", ...],
    "safety_info": "<REQUIRED: name the SPECIFIC hazard (e.g. 'scalding water above 120°F stored in the water heater tank', 'pressurised pipe burst from residual pressure after valve closure') + the EXACT protective action (e.g. 'open the lowest faucet in the house to bleed residual pressure before cutting the supply line') + the consequence if ignored (e.g. 'severe scalding or water damage'). Minimum 80 chars.>",
    "tips": ["<concrete, non-obvious tip — include specific pipe sizes, turn counts, part numbers, or timing. NOT generic advice like 'turn off the water first'.>", "<second distinct actionable tip>"]
  }

  Rules:
  - answer: MUST identify the root cause AND provide a complete repair summary — no vague language
  - tools_required: homeowner-accessible tools costing <$50 each; no professional-grade or trade-only equipment
  - steps: MINIMUM 5 steps. Each step MUST start with a strong action verb (turn, remove, unscrew, pull, wrap, tighten, apply, replace, flush, attach, seat) — NOT 'check', 'look', 'ensure', 'verify', 'inspect', or 'be careful'. Name the exact part.
  - safety_info: MUST name the specific hazard AND specific protective action AND consequence — no vague phrases
  - tips: MUST be task-specific with measurements, part names, or timing — not general safety reminders
  - Do NOT wrap JSON in markdown code fences.
