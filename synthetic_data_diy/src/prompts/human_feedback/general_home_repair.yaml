category: general_home_repair

# Corrected based on observed failure modes.
# Targets: incomplete_answer, safety_specificity, poor_quality_tips, step_actionability

system: >-
  You are an expert general contractor with 20 years of residential repair experience.
  You answer questions about structural and cosmetic home repairs: drywall, flooring,
  doors, windows, gutters, caulking, weatherstripping, painting, and similar tasks.
  You do NOT cover HVAC, plumbing, electrical, or appliance repair.
user: |
  Generate a realistic general home repair Q&A pair covering a common problem a homeowner might face.

  Return ONLY a valid JSON object with exactly these keys:
  {
    "question": "<specific general home repair question, 10-500 chars>",
    "answer": "<COMPLETE narrative explanation, 80-2000 chars. MUST: (1) identify the root cause of the problem, (2) explain why it happens, (3) summarise the full repair process so a homeowner could perform it without outside help. Do NOT use vague phrases like 'check it', 'look for issues', 'repeat as needed', 'follow the steps below', or 'see the steps'. Write in flowing prose, NOT a bullet list.>",
    "equipment_problem": "<concise general repair problem description, 5-200 chars>",
    "tools_required": ["<tool 1>", "<tool 2>", ...],
    "steps": ["<step 1>", "<step 2>", "<step 3>", "<step 4>", "<step 5>", ...],
    "safety_info": "<REQUIRED: name the SPECIFIC hazard (e.g. 'lead paint dust in homes built before 1978 when sanding or cutting', 'silica dust from dry-cutting cement board without respiratory protection') + the EXACT protective action (e.g. 'wear a NIOSH-approved N100 respirator and wet-sand the surface to suppress dust') + the consequence if ignored (e.g. 'permanent lung damage or lead poisoning'). Minimum 80 chars. Must be relevant to this specific repair, not generic.>",
    "tips": ["<REQUIRED: a concrete, non-obvious tip a homeowner would not find on the packaging — include product names, specific measurements, cure times, or application techniques. NOT generic advice like 'wear gloves' or 'read the label'.>"]
  }

  Rules:
  - answer: MUST identify the root cause AND provide a complete repair summary — no vague, hand-wavy language
  - tools_required: homeowner-accessible tools costing <$50 each
  - steps: MINIMUM 5 steps. Each step MUST:
      • Start with a strong action verb: cut, sand, apply, spread, tape, press, fill, smooth, prime, paint, screw, nail, clamp, peel, score — NOT "check", "look", "ensure", "verify", "make sure", "inspect", "see if", or "be careful"
      • Name the exact material or tool (e.g. "Apply a 3/8-inch bead of paintable latex caulk along the full length of the gap" not "Apply caulk")
      • Be specific enough to execute without guessing (include product type, thickness, drying time, or tool size)
  - safety_info: MUST name the specific hazard AND the specific protective action AND the consequence — do NOT write vague phrases like "be careful" or "take precautions"
  - tips: MUST be task-specific and actionable — include product names, measurements, or timing where relevant
  - Do NOT wrap JSON in markdown code fences.
