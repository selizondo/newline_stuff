category: general_home_repair

# Seeded from chain_of_thought + human_feedback corrections.
# Targets: incomplete_answer, safety_specificity, poor_quality_tips, step_actionability

system: >-
  You are a seasoned general contractor with 25 years of home repair experience.
  Before writing any repair guide, you reason through the problem: what is
  actually causing it, what tools are genuinely required, what the safety risk
  is, and what the one professional insight is that most homeowners miss.
user: |
  Generate a complete, detailed general home repair Q&A pair using this reasoning process:

  Think through each of these before writing your answer:
  1. What specific home repair problem will this cover, and what is its root cause?
  2. What tools does this repair actually require? Only include tools under $50 available at hardware stores.
  3. What is the exact safety hazard — name the specific risk (lead paint dust, silica, structural load) and the precise protective action a homeowner must take?
  4. What is one non-obvious professional tip — a specific product name, measurement, or technique a homeowner would not find on the packaging?
  5. What are the ordered steps, each starting with a strong action verb naming the exact material or tool?

  After reasoning through the above, return ONLY a valid JSON object — do not include your reasoning in the output:
  {
    "question": "<specific general home repair question, 10-500 chars>",
    "answer": "<COMPLETE narrative of at least 3 paragraphs: (1) root cause and why it happens, (2) how to fix in prose, (3) prevention. 200-2000 chars. No bullet points. Must be detailed enough that a homeowner can perform the repair without outside help. Do NOT use vague phrases like 'check it', 'look for issues', 'repeat as needed', or 'follow the steps below'.>",
    "equipment_problem": "<concise general repair problem description, 5-200 chars>",
    "tools_required": ["<tool 1>", "<tool 2>", ...],
    "steps": ["<step 1>", "<step 2>", "<step 3>", "<step 4>", "<step 5>", ...],
    "safety_info": "<REQUIRED: name the SPECIFIC hazard (e.g. 'lead paint dust in homes built before 1978 when sanding', 'silica dust from dry-cutting cement board') + the EXACT protective action (e.g. 'wear a NIOSH-approved N100 respirator and wet-sand the surface to suppress dust') + the consequence if ignored (e.g. 'permanent lung damage or lead poisoning'). Minimum 80 chars.>",
    "tips": ["<concrete, non-obvious tip — include product names, specific measurements, cure times, or application techniques. NOT generic advice like 'wear gloves' or 'read the label'.>", "<second distinct actionable tip>"]
  }

  Rules:
  - answer: MUST identify the root cause AND provide a complete repair summary — no vague language
  - tools_required: homeowner-accessible tools costing <$50 each; no professional-grade or trade-only equipment
  - steps: MINIMUM 5 steps. Each step MUST start with a strong action verb (cut, sand, apply, spread, tape, press, fill, smooth, prime, paint, screw) — NOT 'check', 'look', 'ensure', 'verify', 'inspect', or 'be careful'. Name the exact material.
  - safety_info: MUST name the specific hazard AND specific protective action AND consequence — no vague phrases
  - tips: MUST be task-specific with product names, measurements, or timing — not general encouragement
  - Do NOT wrap JSON in markdown code fences.
