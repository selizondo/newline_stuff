category: hvac_maintenance

# Seeded from chain_of_thought + human_feedback corrections.
# Targets: incomplete_answer, safety_specificity, poor_quality_tips, step_actionability

system: >-
  You are a certified HVAC master technician who writes thorough maintenance
  guides. Before writing any guide, you reason through the mechanical problem:
  what component is failing and why, what tools are genuinely needed, what
  safety hazard exists, and the professional insight most homeowners miss.
user: |
  Generate a complete, detailed HVAC maintenance or repair Q&A pair using this reasoning process:

  Think through each of these before writing your answer:
  1. What specific HVAC problem will this cover, and what mechanical component is failing and why?
  2. What tools does this repair actually require? Only include tools under $50 available at hardware stores.
  3. What is the exact safety hazard — name the specific risk (refrigerant pressure, high voltage capacitor, carbon monoxide) and the precise protective action?
  4. What is one non-obvious professional tip — a specific measurement, part size, or timing a homeowner would not find in the manual?
  5. What are the ordered steps, each starting with a strong action verb naming the exact component?

  After reasoning through the above, return ONLY a valid JSON object — do not include your reasoning in the output:
  {
    "question": "<specific HVAC repair or maintenance question, 10-500 chars>",
    "answer": "<COMPLETE narrative of at least 3 paragraphs: (1) root cause and why it happens, (2) how to fix in prose, (3) prevention. 200-2000 chars. No bullet points. Must be detailed enough that a homeowner can perform the repair without outside help. Do NOT use vague phrases like 'check it', 'look for issues', 'repeat as needed', or 'follow the steps below'.>",
    "equipment_problem": "<concise HVAC-specific problem description, 5-200 chars>",
    "tools_required": ["<tool 1>", "<tool 2>", ...],
    "steps": ["<step 1>", "<step 2>", "<step 3>", "<step 4>", "<step 5>", ...],
    "safety_info": "<REQUIRED: name the SPECIFIC hazard (e.g. 'high-voltage capacitor holding 370–440V charge for up to 30 minutes after power off') + the EXACT protective action (e.g. 'discharge capacitor using an insulated screwdriver bridged across both terminals before touching any wires') + the consequence if ignored (e.g. 'fatal electrocution'). Minimum 80 chars.>",
    "tips": ["<concrete, non-obvious tip — include specific measurements, filter sizes, model-number lookups, or timing. NOT generic advice like 'be careful' or 'read the manual'.>", "<second distinct actionable tip>"]
  }

  Rules:
  - answer: MUST identify the root cause AND provide a complete repair summary — no vague language
  - tools_required: homeowner-accessible tools costing <$50 each; no professional-grade or trade-only equipment
  - steps: MINIMUM 5 steps. Each step MUST start with a strong action verb (slide, remove, replace, press, set, turn, measure, clean, tape, seal, disconnect) — NOT 'check', 'look', 'ensure', 'verify', 'inspect', or 'be careful'. Name the exact component.
  - safety_info: MUST name the specific hazard AND specific protective action AND consequence — no vague phrases
  - tips: MUST be task-specific with numbers, part names, or timing — not general safety reminders
  - Do NOT wrap JSON in markdown code fences.
