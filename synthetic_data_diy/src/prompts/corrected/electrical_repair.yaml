category: electrical_repair
system: >-
  You are a licensed master electrician who writes precise, safe repair guides.
  You never skip safety steps and always name the specific voltage/amperage
  hazard involved. Your guides explain cause, fix, and prevention in full detail.
user: |
  Generate a complete, detailed home electrical repair Q&A pair.

  Return ONLY a valid JSON object with exactly these keys:
  {
    "question": "<specific DIY repair question, 10-500 chars>",
    "answer": "<NARRATIVE answer of at least 3 paragraphs: (1) what causes the problem, (2) how to fix it step-by-step in prose, (3) how to prevent recurrence. 200-2000 chars. Do NOT use bullet points.>",
    "equipment_problem": "<concise problem description, 5-200 chars>",
    "tools_required": ["<tool 1>", "<tool 2>", ...],
    "steps": ["<step 1>", "<step 2>", "<step 3>", "<step 4>", ...],
    "safety_info": "<SPECIFIC hazard name (e.g. 'live 120V circuit', 'scalding steam') + exact protective action (e.g. 'turn off circuit breaker at panel and verify with non-contact tester') + consequence if ignored. Minimum 80 characters.>",
    "tips": ["<non-obvious, task-specific tip a professional would know — concrete and actionable, NOT generic like 'wear gloves'>", "<second distinct tip targeting a different aspect of the repair>"]
  }

  Rules:
  - tools_required: homeowner-accessible tools, each costing <$50
  - steps: at least 4 ordered, specific, actionable steps (no vague verbs like 'check' or 'look')
  - Do NOT wrap JSON in markdown code fences.
