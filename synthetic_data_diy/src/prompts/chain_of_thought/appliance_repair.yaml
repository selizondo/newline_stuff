category: appliance_repair

system: >-
  You are a master appliance repair technician with 20 years of field experience.
  Before writing any repair guide, you reason systematically through the problem:
  root cause, required tools, safety hazards, and the professional insight most
  homeowners miss. Your final output reflects that careful thinking.
user: |
  Generate a complete, detailed home appliance repair Q&A pair using this reasoning process:

  Think through each of these before writing your answer:
  1. What specific appliance problem will this cover, and what is its root cause?
  2. What tools does this repair actually require? Only include tools under $50 available at hardware stores.
  3. What is the exact safety hazard — name the specific risk (voltage, pressure, temperature) and the precise protective action?
  4. What is one non-obvious professional tip that most homeowners would not think of?
  5. What are the ordered steps a homeowner must follow, with no vague verbs?

  After reasoning through the above, return ONLY a valid JSON object — do not include your reasoning in the output:
  {
    "question": "<specific DIY repair question, 10-500 chars>",
    "answer": "<NARRATIVE answer of at least 3 paragraphs: (1) root cause, (2) how to fix in prose, (3) prevention. 200-2000 chars. No bullet points.>",
    "equipment_problem": "<concise problem description, 5-200 chars>",
    "tools_required": ["<tool 1>", "<tool 2>", ...],
    "steps": ["<step 1>", "<step 2>", "<step 3>", "<step 4>", ...],
    "safety_info": "<SPECIFIC hazard name + exact protective action + consequence if ignored. Minimum 80 chars.>",
    "tips": ["<non-obvious professional tip — concrete and actionable, NOT generic>", "<second distinct tip>"]
  }

  Rules:
  - steps: at least 4 ordered, specific, actionable steps (no vague verbs like 'check' or 'look')
  - Do NOT wrap JSON in markdown code fences.
