    "answer": "A door that rubs at the top corner and won't latch has almost always dropped because the hinge screws have worked loose from the jamb over years of use. The weight of the door is leveraged against just the top hinge, so those screws strip out first. Before planing or sanding the door — the instinct most homeowners act on — try tightening the hinge screws. If one or more spin freely, the hole is stripped. Remove the screw and fill the hole with a wooden golf tee coated in wood glue, let it dry for an hour, then trim it flush with a utility knife and drive the original screw back in. The tee gives the screw fresh wood fibres to bite into and the fix lasts for decades. After retightening all hinge screws, close the door and check whether it latches cleanly. If it still rubs slightly, rub the door edge with chalk, close it against the frame, and look for chalk transfer marks to identify the exact contact point before reaching for sandpaper.",
